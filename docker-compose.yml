services:
  dolt:
    image: dolthub/dolt:1.43.0
    container_name: dolt-remote
    restart: unless-stopped
    command: >
      dolt sql-server
      --host 0.0.0.0
      --port 3306
      --remotesapi-port 8080
      --data-dir /var/lib/dolt
    volumes:
      - dolt_data:/var/lib/dolt
    expose:
      - "8080"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dolt.rule=Host(`dolt.adrianphilipp.de`)"
      - "traefik.http.routers.dolt.entrypoints=websecure"
      - "traefik.http.routers.dolt.tls.certresolver=letsencrypt"
      - "traefik.http.services.dolt.loadbalancer.server.port=8080"
      - "traefik.http.routers.dolt.middlewares=dolt-auth"
      - "traefik.http.middlewares.dolt-auth.basicauth.users=${BASIC_AUTH_USER}"
    networks:
      - proxy

networks:
  proxy:
    external: true

volumes:
  dolt_data:
