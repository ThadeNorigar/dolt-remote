services:
  dolt:
    image: dolthub/dolt:1.83.5
    container_name: dolt-remote
    restart: unless-stopped
    entrypoint: ["bash", "/entrypoint.sh"]
    environment:
      - BEADS_REMOTE_PW=${BEADS_REMOTE_PW:-hi5vpTRWdH1Wjb2MnP4LlfAr}
      - DOLT_REMOTE_PASSWORD=${BEADS_REMOTE_PW:-hi5vpTRWdH1Wjb2MnP4LlfAr}
      - DOLT_REMOTE_USER=adrian
    volumes:
      - dolt_data:/var/lib/dolt
      - ./entrypoint.sh:/entrypoint.sh:ro
      - ./init-databases.sh:/init-databases.sh:ro
    expose:
      - "8080"   # RemoteAPI (gRPC) — Caddy proxied :50051 → hier
      - "3306"   # SQL Server — nur intern
    networks:
      - proxy

networks:
  proxy:
    external: true

volumes:
  dolt_data:
