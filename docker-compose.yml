services:
  dolt:
    image: dolthub/dolt:1.83.5
    container_name: dolt-remote
    restart: unless-stopped
    entrypoint: ["bash", "/entrypoint.sh"]
    environment:
      - BEADS_REMOTE_PW=${BEADS_REMOTE_PW:-hi5vpTRWdH1Wjb2MnP4LlfAr}
    volumes:
      - dolt_data:/var/lib/dolt
      - ./entrypoint.sh:/entrypoint.sh:ro
    expose:
      - "8080"
      - "3306"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dolt.rule=Host(`dolt.adrianphilipp.de`)"
      - "traefik.http.routers.dolt.entrypoints=websecure"
      - "traefik.http.routers.dolt.tls.certresolver=letsencrypt"
      - "traefik.http.services.dolt.loadbalancer.server.port=8080"
      - "traefik.http.services.dolt.loadbalancer.server.scheme=h2c"
    networks:
      - proxy

networks:
  proxy:
    external: true

volumes:
  dolt_data:
